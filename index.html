<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Vachana - Client Meeting Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1628;
    --navy-2:#142840;
    --gold:#C9A84C;
    --gold-light:#E8D5A3;
    --gold-dark:#A8893A;
    --bg:#F5F3F0;
    --surface:#FFFFFF;
    --text:#1A2233;
    --muted:#6B7280;
    --line:#E4E7EC;
    --success:#1F9D63;
    --success-bg:#E5F6ED;
    --warn:#B5761A;
    --warn-bg:#FDF1DE;
    --danger:#C0392B;
    --danger-bg:#FBEAE8;
    --info:#2563A8;
    --info-bg:#E7F0FA;
    --radius:14px;
    --shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    cursor:default;
  }
  input, select, textarea, button{
    cursor:pointer;
  }
  input:focus, select:focus, textarea:focus{
    cursor:text;
  }
  #app{
    max-width:440px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  .topbar{
    background: var(--surface);
    color:var(--text);
    padding:12px 18px 12px;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom: 2px solid var(--gold);
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-logo{
    height:36px;
    width:auto;
    object-fit:contain;
  }
  .brand-text{display:flex;flex-direction:column;}
  .brand-name{
    font-family:'Sora',sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.3px;
    color:var(--navy);
  }
  .brand-sub{
    font-size:8px;
    opacity:0.6;
    font-weight:500;
    letter-spacing:0.8px;
    text-transform:uppercase;
    color:var(--navy);
  }
  .icon-btn{
    background:rgba(10,22,40,0.05);
    border:1px solid rgba(10,22,40,0.1);
    color:var(--navy);
    width:34px;
    height:34px;
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:16px;
    transition:all 0.2s;
  }
  .icon-btn:active{background:rgba(10,22,40,0.1);}

  .content{flex:1;padding:16px 16px 90px;}

  .search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--surface);
    border-radius:12px;
    padding:10px 14px;
    border:2px solid var(--gold-light);
    margin-bottom:14px;
    transition:border-color 0.3s;
  }
  .search-box:focus-within{border-color:var(--gold);}
  .search-box input{
    border:none;
    outline:none;
    flex:1;
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:transparent;
    color:var(--text);
    cursor:text;
  }
  .search-box input::placeholder{color:var(--muted);}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
    transition:all 0.15s;
    border-left: 3px solid var(--gold);
  }
  .card:active{transform:scale(0.98);}
  .client-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .client-name{font-weight:600;font-size:15px;}
  .client-sub{font-size:13px;color:var(--muted);margin-top:2px;}
  
  .meeting-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .meeting-main{flex:1;min-width:0;}
  .meeting-name{font-weight:600;font-size:15px;}
  .meeting-meta{font-size:13px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .badge.scheduled{background:var(--info-bg);color:var(--info);}
  .badge.completed{background:var(--success-bg);color:var(--success);}
  .badge.rescheduled{background:var(--warn-bg);color:var(--warn);}
  .badge.cancelled{background:var(--danger-bg);color:var(--danger);}
  .badge.lost{background:var(--danger-bg);color:var(--danger);}
  .badge.inprogress{background:var(--warn-bg);color:var(--warn);}
  .badge.new{background:var(--info-bg);color:var(--info);}
  
  .stage-badge{
    font-size:10px;
    padding:2px 8px;
    border-radius:12px;
    font-weight:500;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty i{font-size:30px;display:block;margin-bottom:10px;opacity:0.5;}

  .bottomnav{
    position:sticky;
    bottom:0;
    background:var(--surface);
    border-top:2px solid var(--gold-light);
    display:flex;
    max-width:440px;
    margin:0 auto;
    width:100%;
    z-index:10;
  }
  .navbtn{
    flex:1;
    border:none;
    background:none;
    padding:11px 0 9px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:500;
    cursor:pointer;
    transition:color 0.2s;
    position:relative;
  }
  .navbtn.active{
    color:var(--navy);
  }
  .navbtn.active::after{
    content:'';
    position:absolute;
    top:-2px;
    left:30%;
    right:30%;
    height:3px;
    background:var(--gold);
    border-radius:0 0 3px 3px;
  }
  .navbtn .dot{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:18px;}

  .sheet-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,22,40,0.6);
    display:flex;
    align-items:flex-end;
    z-index:50;
    animation:fadeIn 0.2s ease-out;
  }
  .sheet{
    background:var(--surface);
    width:100%;
    max-width:440px;
    margin:0 auto;
    border-radius:20px 20px 0 0;
    padding:20px 18px 24px;
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp 0.3s ease-out;
    border-top: 3px solid var(--gold);
  }
  @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
  .sheet-title{
    font-family:'Sora',sans-serif;
    font-weight:600;
    font-size:17px;
    margin-bottom:2px;
    color:var(--navy);
  }
  .sheet-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}

  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px;}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
    width:100%;
    border:2px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:#fff;
    outline:none;
    transition:border-color 0.2s;
    cursor:text;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:60px;}

  .btn{
    width:100%;
    padding:13px;
    border-radius:11px;
    border:none;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    margin-top:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:all 0.15s;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:active{background:var(--navy-2);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:active{background:var(--gold-dark);color:#fff;}
  .btn-outline{background:none;border:2px solid var(--line);color:var(--text);}
  .btn-outline:active{background:var(--bg);}
  .btn-success{background:var(--success);color:#fff;}
  .btn-success:active{background:#168a54;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-danger:active{background:#a93226;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}

  .gps-box{border:1px dashed var(--line);border-radius:12px;padding:14px;margin-top:14px;text-align:center;}
  .gps-box.captured{border-style:solid;border-color:var(--success);background:var(--success-bg);}
  .gps-coords{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--success);margin-top:6px;}
  .gps-addr{font-size:12px;color:var(--muted);margin-top:4px;}
  .pin{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:17px;position:relative;}
  .pin.pulse::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--success);animation:pulse 1.4s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(0.7);opacity:1;}100%{transform:scale(1.6);opacity:0;}}

  .toast{
    position:fixed;
    left:50%;
    bottom:100px;
    transform:translateX(-50%);
    background:var(--navy);
    color:#fff;
    padding:11px 18px;
    border-radius:10px;
    font-size:13px;
    font-weight:500;
    z-index:100;
    max-width:80%;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
    animation:slideUp 0.3s ease-out;
    border-left: 3px solid var(--gold);
  }

  .login-wrap{
    padding:40px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:80vh;
  }
  .login-logo{
    width:140px;
    height:auto;
    margin:0 auto 24px;
    display:block;
    border-radius:12px;
    background:var(--surface);
    padding:20px;
    box-shadow:0 4px 20px rgba(201,168,76,0.15);
  }
  .login-title{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:24px;
    text-align:center;
    color:var(--navy);
  }
  .login-sub{
    font-size:14px;
    color:var(--muted);
    text-align:center;
    margin-top:8px;
    line-height:1.6;
  }
  .login-company{
    text-align:center;
    font-size:11px;
    color:var(--gold-dark);
    font-weight:600;
    margin-top:4px;
    letter-spacing:1px;
  }
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .pipeline-container{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px;
    border:2px solid var(--gold-light);
  }
  .pipeline-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
  .stat-card.success{background:var(--success-bg);}
  .stat-value{font-size:20px;font-weight:700;font-family:'Sora',sans-serif;color:var(--navy);}
  .stat-card.success .stat-value{color:var(--success);}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600;}
  
  .pipeline-stages{margin-top:12px;}
  .stage-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);}
  .stage-item:last-child{border-bottom:none;}
  .stage-name{font-size:12px;font-weight:500;min-width:100px;color:var(--text);display:flex;align-items:center;gap:4px;}
  .stage-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
  .stage-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
  .stage-count{font-size:11px;color:var(--muted);min-width:50px;text-align:right;font-weight:500;}

  .pipeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .pipeline-header h3{margin:0;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--navy);}
  .refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
  .refresh-btn:active{transform:rotate(180deg);transition:transform 0.3s;}

  .stage-color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}

  .amount-input{font-family:'IBM Plex Mono',monospace;}
  .vachana-watermark{
    text-align:center;
    font-size:9px;
    color:var(--gold);
    opacity:0.4;
    margin-top:12px;
    font-weight:600;
    letter-spacing:2px;
  }
  .user-info{
    font-size:11px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .user-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    background:var(--gold-light);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--navy);
    font-weight:600;
    font-size:12px;
  }

  .clickable, .clickable *, [onclick], [onclick] * {
    cursor:pointer !important;
  }

  .debug-info{
    font-size:11px;
    color:var(--muted);
    background:var(--bg);
    padding:8px 12px;
    border-radius:8px;
    margin-top:12px;
    text-align:left;
    width:100%;
    max-width:320px;
    word-break:break-all;
  }

  @media(max-width:380px){
    .stage-name{min-width:80px;font-size:11px;}
    .stat-value{font-size:17px;}
    .pipeline-stats-grid{gap:6px;}
    .stat-card{padding:8px;}
    .login-logo{width:100px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- Google OAuth Client Library -->
<script src="https://apis.google.com/js/api.js"></script>

<script>
// ============================================================
// VACHANA INVESTMENTS - Client Meeting Tracker
// Google Sheets API Configuration
// ============================================================
const CLIENT_ID = '1030005146870-7ta2nhd4kc7fopm7qdbi4qgld4q31uos.apps.googleusercontent.com';
const API_KEY = 'AIzaSyDh6wOVcdFwHiZbawa2g7U-qtu72ExJzDA';
const SPREADSHEET_ID = '1ZsJNHfdbCbnMVhi4MKC2sCe_4Vof6rnGApVlOYbIwlg';
const DISCOVERY_DOCS = ['https://sheets.googleapis.com/$discovery/rest?version=v4'];
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// Pipeline Stages
const PIPELINE_STAGES = [
  'Lead In',
  'Qualified Lead',
  'Meeting Scheduled',
  'First Meeting',
  'Proposal Sent',
  'Under Review',
  'Negotiation',
  'Decision Pending',
  'Client Onboarded',
  'Lost'
];

const STAGE_COLORS = {
  'Lead In': '#6B7280',
  'Qualified Lead': '#3B82F6',
  'Meeting Scheduled': '#8B5CF6',
  'First Meeting': '#EC4899',
  'Proposal Sent': '#F59E0B',
  'Under Review': '#F97316',
  'Negotiation': '#EF4444',
  'Decision Pending': '#8B5CF6',
  'Client Onboarded': '#10B981',
  'Lost': '#6B7280'
};

// Sheet column mappings
const LEAD_COLUMNS = {
  name: 0,
  mobile: 1,
  email: 2,
  company: 3
};

const MEETING_HEADERS = [
  'Meeting ID', 'Lead Name', 'Mobile No', 'Email Id', 'Company', 'Investment Amount',
  'Meeting Date', 'Meeting Time', 'Purpose', 'Status',
  'Pipeline Stage', 'Stage Updated Date',
  'Address', 'Latitude', 'Longitude',
  'Notes', 'Created At', 'Last Updated At', 'Updated By'
];

let state = {
  isSignedIn: false,
  userEmail: '',
  userName: '',
  tab: 'search',
  query: '',
  searchResults: [],
  searching: false,
  meetings: [],
  meetingsLoading: false,
  bookingClient: null,
  updatingMeeting: null,
  gps: null,
  gpsCapturing: false,
  toast: null,
  repName: '',
  pipelineStats: null,
  pipelineLoading: false,
  gapiInitialized: false,
  authInitialized: false,
  debugLogs: []
};

function addDebugLog(msg) {
  state.debugLogs.push(new Date().toLocaleTimeString() + ': ' + msg);
  console.log(msg);
  if (state.debugLogs.length > 20) state.debugLogs.shift();
  render();
}

// Google OAuth Functions
function initGoogleAPI() {
  if (state.gapiInitialized) return;
  
  addDebugLog('Initializing Google API...');
  
  gapi.load('client:auth2', function() {
    addDebugLog('gapi loaded, initializing client...');
    gapi.client.init({
      apiKey: API_KEY,
      clientId: CLIENT_ID,
      discoveryDocs: DISCOVERY_DOCS,
      scope: SCOPES
    }).then(function() {
      state.gapiInitialized = true;
      addDebugLog('✅ Google API initialized successfully!');
      
      gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
      
      const isSignedIn = gapi.auth2.getAuthInstance().isSignedIn.get();
      addDebugLog('Initial sign-in status: ' + isSignedIn);
      updateSigninStatus(isSignedIn);
    }).catch(function(error) {
      addDebugLog('❌ ERROR initializing Google API: ' + error.message);
      showToast('Error: ' + error.message);
    });
  });
}

function updateSigninStatus(isSignedIn) {
  addDebugLog('Sign-in status changed: ' + isSignedIn);
  state.isSignedIn = isSignedIn;
  state.authInitialized = true;
  if (isSignedIn) {
    const user = gapi.auth2.getAuthInstance().currentUser.get();
    const profile = user.getBasicProfile();
    state.userEmail = profile.getEmail();
    state.userName = profile.getName();
    state.repName = state.userName;
    addDebugLog('✅ Signed in as: ' + state.userEmail);
    render();
    loadData();
  } else {
    state.userEmail = '';
    state.userName = '';
    render();
  }
}

function signIn() {
  addDebugLog('🔑 Sign in button clicked');
  
  if (!state.gapiInitialized) {
    addDebugLog('Google API not initialized, initializing...');
    showToast('Loading Google API... Please wait.');
    initGoogleAPI();
    setTimeout(() => {
      if (state.gapiInitialized) {
        addDebugLog('API initialized, attempting sign in...');
        gapi.auth2.getAuthInstance().signIn();
      } else {
        addDebugLog('API still not initialized, retrying...');
        setTimeout(signIn, 2000);
      }
    }, 1500);
    return;
  }
  
  try {
    addDebugLog('Attempting sign in...');
    gapi.auth2.getAuthInstance().signIn()
      .then(() => {
        addDebugLog('✅ Sign in successful!');
      })
      .catch((error) => {
        addDebugLog('❌ Sign in error: ' + JSON.stringify(error));
        showToast('Sign in error: ' + (error.error || error.message || 'Unknown error'));
      });
  } catch (error) {
    addDebugLog('❌ Sign in exception: ' + error.message);
    showToast('Error: ' + error.message);
  }
}

function signOut() {
  addDebugLog('🚪 Sign out clicked');
  if (state.gapiInitialized) {
    gapi.auth2.getAuthInstance().signOut();
  }
  state.isSignedIn = false;
  state.userEmail = '';
  state.userName = '';
  render();
}

// Google Sheets API Functions
async function getSheetData(sheetName, range = '') {
  try {
    const response = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SPREADSHEET_ID,
      range: sheetName + (range ? '!' + range : '')
    });
    return response.result.values || [];
  } catch (error) {
    console.error('Error fetching sheet data:', error);
    showToast('Error accessing sheet: ' + error.message);
    return [];
  }
}

async function appendToSheet(sheetName, values) {
  try {
    const response = await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SPREADSHEET_ID,
      range: sheetName,
      valueInputOption: 'USER_ENTERED',
      insertDataOption: 'INSERT_ROWS',
      resource: {
        values: [values]
      }
    });
    return response.result;
  } catch (error) {
    console.error('Error appending to sheet:', error);
    showToast('Error saving data: ' + error.message);
    throw error;
  }
}

async function updateSheet(sheetName, range, values) {
  try {
    const response = await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SPREADSHEET_ID,
      range: sheetName + '!' + range,
      valueInputOption: 'USER_ENTERED',
      resource: {
        values: [values]
      }
    });
    return response.result;
  } catch (error) {
    console.error('Error updating sheet:', error);
    showToast('Error updating data: ' + error.message);
    throw error;
  }
}

async function getMeetingsSheet() {
  const meetingsSheetName = 'Meetings';
  
  try {
    const response = await gapi.client.sheets.spreadsheets.get({
      spreadsheetId: SPREADSHEET_ID
    });
    const sheets = response.result.sheets;
    const hasMeetingsSheet = sheets.some(s => s.properties.title === meetingsSheetName);
    
    if (!hasMeetingsSheet) {
      await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId: SPREADSHEET_ID,
        resource: {
          requests: [{
            addSheet: {
              properties: {
                title: meetingsSheetName
              }
            }
          }]
        }
      });
      
      await appendToSheet(meetingsSheetName, MEETING_HEADERS);
      showToast('Meetings sheet created!');
    }
  } catch (error) {
    console.error('Error creating Meetings sheet:', error);
    showToast('Error: ' + error.message);
  }
  
  return meetingsSheetName;
}

// Data functions
async function searchLeads(query) {
  const values = await getSheetData('LEADS');
  if (!values || values.length < 2) return [];
  
  const q = query.trim().toLowerCase();
  const results = [];
  
  for (let i = 1; i < values.length; i++) {
    const row = values[i];
    const name = String(row[LEAD_COLUMNS.name] || '');
    const mobile = String(row[LEAD_COLUMNS.mobile] || '');
    const email = String(row[LEAD_COLUMNS.email] || '');
    const company = String(row[LEAD_COLUMNS.company] || '');
    
    const haystack = (name + ' ' + mobile + ' ' + email + ' ' + company).toLowerCase();
    if (!q || haystack.indexOf(q) !== -1) {
      results.push({
        name: name,
        mobile: mobile,
        email: email,
        company: company,
      });
    }
    if (results.length >= 25) break;
  }
  return results;
}

async function listMeetings() {
  const meetingsSheet = await getMeetingsSheet();
  const values = await getSheetData(meetingsSheet);
  if (!values || values.length < 2) return [];
  
  const headers = values[0];
  const meetings = [];
  for (let i = 1; i < values.length; i++) {
    const row = values[i];
    if (!row[0]) continue;
    const obj = {};
    headers.forEach((h, j) => obj[headerKey(h)] = row[j] || '');
    meetings.push(obj);
  }
  return meetings.reverse();
}

function headerKey(h) {
  return String(h).replace(/\s+/g, '').replace(/^./, c => c.toLowerCase());
}

async function bookMeeting(data) {
  const meetingsSheet = await getMeetingsSheet();
  const id = 'MTG-' + new Date().toISOString().slice(2,10).replace(/-/g,'') + 
             new Date().toTimeString().slice(0,8).replace(/:/g,'');
  const now = new Date().toISOString();
  const initialStage = data.pipelineStage || 'Lead In';
  
  const row = [
    id,
    data.leadName || '',
    data.mobile || '',
    data.email || '',
    data.company || '',
    data.investmentAmount || '',
    data.meetingDate || '',
    data.meetingTime || '',
    data.purpose || '',
    'Scheduled',
    initialStage,
    now,
    data.address || '',
    data.latitude || '',
    data.longitude || '',
    data.notes || '',
    now,
    now,
    data.updatedBy || ''
  ];
  
  await appendToSheet(meetingsSheet, row);
  return { success: true, meetingId: id };
}

async function updateMeeting(data) {
  const meetingsSheet = await getMeetingsSheet();
  const values = await getSheetData(meetingsSheet);
  if (!values || values.length < 2) return { error: 'No meetings found' };
  
  const headers = values[0];
  const idCol = 0;
  let rowIndex = -1;
  
  for (let i = 1; i < values.length; i++) {
    if (values[i][idCol] === data.meetingId) {
      rowIndex = i;
      break;
    }
  }
  
  if (rowIndex === -1) return { error: 'Meeting ID not found' };
  
  const row = values[rowIndex];
  const rowNum = rowIndex + 1;
  const updateMap = {
    'Status': data.status,
    'Pipeline Stage': data.pipelineStage,
    'Investment Amount': data.investmentAmount,
    'Address': data.address,
    'Latitude': data.latitude,
    'Longitude': data.longitude,
    'Notes': data.notes,
    'Last Updated At': new Date().toISOString(),
    'Updated By': data.updatedBy,
  };
  
  const updatedRow = [...row];
  headers.forEach((h, j) => {
    if (updateMap[h] !== undefined && updateMap[h] !== null && updateMap[h] !== '') {
      updatedRow[j] = updateMap[h];
    }
  });
  
  const range = `A${rowNum}:${String.fromCharCode(65 + updatedRow.length - 1)}${rowNum}`;
  await updateSheet(meetingsSheet, range, updatedRow);
  return { success: true };
}

async function getPipelineStats() {
  const meetings = await listMeetings();
  if (!meetings || meetings.length === 0) {
    return {
      stats: {},
      total: 0,
      conversionRates: {},
      stages: PIPELINE_STAGES,
      winRate: '0%',
      won: 0,
      lost: 0,
      totalInvestmentAmount: 0,
      closedInvestmentAmount: 0
    };
  }
  
  const stats = {};
  PIPELINE_STAGES.forEach(stage => stats[stage] = 0);
  let totalAmount = 0;
  let closedAmount = 0;
  
  meetings.forEach(m => {
    const stage = m.pipelinestage || 'Lead In';
    if (stats[stage] !== undefined) stats[stage]++;
    const amount = parseFloat(m.investmentAmount) || 0;
    totalAmount += amount;
    if (stage === 'Client Onboarded') closedAmount += amount;
  });
  
  const total = meetings.length;
  const conversionRates = {};
  for (const [stage, count] of Object.entries(stats)) {
    conversionRates[stage] = total > 0 ? ((count / total) * 100).toFixed(1) + '%' : '0%';
  }
  
  const won = stats['Client Onboarded'] || 0;
  const lost = stats['Lost'] || 0;
  const totalClosed = won + lost;
  const winRate = totalClosed > 0 ? ((won / totalClosed) * 100).toFixed(1) + '%' : '0%';
  
  return {
    stats: stats,
    total: total,
    conversionRates: conversionRates,
    stages: PIPELINE_STAGES,
    winRate: winRate,
    won: won,
    lost: lost,
    totalInvestmentAmount: totalAmount,
    closedInvestmentAmount: closedAmount
  };
}

function showToast(msg, ms){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast=null; render(); }, ms||2200);

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function statusClass(s){
  s = (s||'scheduled').toLowerCase();
  if(s.indexOf('complet')!==-1 || s === 'completed') return 'completed';
  if(s.indexOf('resched')!==-1) return 'rescheduled';
  if(s.indexOf('cancel')!==-1) return 'cancelled';
  if(s === 'lost') return 'lost';
  if(s === 'new') return 'new';
  return 'inprogress';
}

function captureLocation(){
  if(!navigator.geolocation){
    showToast('Location not supported on this device');
    return;
  }
  state.gpsCapturing = true; render();
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    state.gps = {lat, lng, address: 'Looking up address...'};
    state.gpsCapturing = false;
    render();
    try{
      const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
      const j = await r.json();
      const addr = [j.locality, j.city, j.principalSubdivision].filter(Boolean).join(', ');
      state.gps.address = addr || 'Address unavailable';
    }catch(e){
      state.gps.address = 'Address lookup failed';
    }
    render();
  }, (err)=>{
    state.gpsCapturing = false;
    showToast('Could not get location: ' + err.message);
    render();
  }, {enableHighAccuracy:true, timeout:12000});
}

async function submitUpdate(form){
  const payload = {
    meetingId: state.updatingMeeting.meetingID || state.updatingMeeting['meetingID'],
    status: form.status,
    notes: form.notes,
    investmentAmount: form.amount,
    address: state.gps ? state.gps.address : '',
    latitude: state.gps ? state.gps.lat : '',
    longitude: state.gps ? state.gps.lng : '',
    updatedBy: state.repName || state.userEmail || '',
  };
  showToast('Saving update...', 30000);
  try{
    const res = await updateMeeting(payload);
    if(res.success){
      state.updatingMeeting = null;
      state.gps = null;
      showToast('Meeting updated ✅');
      fetchMeetings();
      fetchPipelineStats();
    }else{
      showToast(res.error || 'Could not update meeting');
    }
  }catch(e){
    showToast('Error: ' + e.message);
  }
  render();
}

function render(){
  const app = document.getElementById('app');
  
  if (!state.isSignedIn) {
    app.innerHTML = renderLogin();
    return;
  }
  
  let body = state.tab==='search' ? renderSearchTab() : renderMeetingsTab();
  app.innerHTML = `
    ${body}
    ${renderBottomNav()}
    ${renderBookingSheet()}
    ${renderUpdateSheet()}
    ${renderToast()}
  `;
}

// Initialize
function init() {
  addDebugLog('🚀 App starting...');
  addDebugLog('📊 SPREADSHEET_ID: ' + SPREADSHEET_ID);
  addDebugLog('🔑 CLIENT_ID: ' + CLIENT_ID.substring(0, 20) + '...');
  
  if (typeof gapi !== 'undefined') {
    addDebugLog('✅ gapi found, initializing...');
    initGoogleAPI();
  } else {
    addDebugLog('⏳ gapi not found, waiting...');
    setTimeout(init, 1000);
  }
}

init();
</script>
</body>
</html>
