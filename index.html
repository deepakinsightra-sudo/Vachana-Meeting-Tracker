<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Vachana - Client Meeting Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1628;
    --navy-2:#142840;
    --gold:#C9A84C;
    --gold-light:#E8D5A3;
    --gold-dark:#A8893A;
    --bg:#F5F3F0;
    --surface:#FFFFFF;
    --text:#1A2233;
    --muted:#6B7280;
    --line:#E4E7EC;
    --success:#1F9D63;
    --success-bg:#E5F6ED;
    --warn:#B5761A;
    --warn-bg:#FDF1DE;
    --danger:#C0392B;
    --danger-bg:#FBEAE8;
    --info:#2563A8;
    --info-bg:#E7F0FA;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);}
  #app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;}

  .topbar{background:var(--surface);color:var(--text);padding:12px 18px;position:sticky;top:0;z-index:10;border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:'Sora',sans-serif;font-weight:700;font-size:15px;flex-shrink:0;}
  .brand-logo-img{height:32px;width:auto;max-width:120px;object-fit:contain;flex-shrink:0;}
  .login-logo{width:120px;height:auto;margin:0 auto 18px;display:block;object-fit:contain;}
  .brand-text{display:flex;flex-direction:column;}
  .brand-name{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;color:var(--navy);}
  .brand-sub{font-size:9px;opacity:0.6;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--navy);}
  .icon-btn{background:rgba(10,22,40,0.05);border:1px solid rgba(10,22,40,0.1);color:var(--navy);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .icon-btn:active{background:rgba(10,22,40,0.1);}

  .content{flex:1;padding:16px 16px 90px;}

  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:10px 14px;border:2px solid var(--gold-light);margin-bottom:14px;}
  .search-box input{border:none;outline:none;flex:1;font-size:15px;font-family:'Inter',sans-serif;background:transparent;color:var(--text);}
  .search-box input::placeholder{color:var(--muted);}

  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;}
  .card:active{transform:scale(0.98);}
  .client-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .client-name{font-weight:600;font-size:15px;}
  .client-sub{font-size:13px;color:var(--muted);margin-top:2px;}

  .meeting-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .meeting-main{flex:1;min-width:0;}
  .meeting-name{font-weight:600;font-size:15px;}
  .meeting-meta{font-size:13px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .badge.scheduled{background:var(--info-bg);color:var(--info);}
  .badge.completed{background:var(--success-bg);color:var(--success);}
  .badge.rescheduled{background:var(--warn-bg);color:var(--warn);}
  .badge.cancelled{background:var(--danger-bg);color:var(--danger);}
  .badge.lost{background:var(--danger-bg);color:var(--danger);}
  .badge.inprogress{background:var(--warn-bg);color:var(--warn);}
  .stage-badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;white-space:nowrap;}
  .meeting-location{font-size:12px;color:var(--muted);margin-top:5px;}
  .meeting-location a{color:var(--info);text-decoration:none;font-weight:600;}
  .meeting-notes-preview{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;}

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}

  .bottomnav{position:sticky;bottom:0;background:var(--surface);border-top:2px solid var(--gold-light);display:flex;max-width:440px;margin:0 auto;width:100%;z-index:10;}
  .navbtn{flex:1;border:none;background:none;padding:11px 0 9px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;position:relative;}
  .navbtn.active{color:var(--navy);}
  .navbtn.active::after{content:'';position:absolute;top:-2px;left:30%;right:30%;height:3px;background:var(--gold);border-radius:0 0 3px 3px;}
  .navbtn .dot{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:18px;}

  .sheet-overlay{position:fixed;inset:0;background:rgba(10,22,40,0.6);display:flex;align-items:flex-end;z-index:50;}
  .sheet{background:var(--surface);width:100%;max-width:440px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 18px 24px;max-height:88vh;overflow-y:auto;border-top:3px solid var(--gold);}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
  .sheet-title{font-family:'Sora',sans-serif;font-weight:600;font-size:17px;margin-bottom:2px;color:var(--navy);}
  .sheet-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}

  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px;}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
    width:100%;border:2px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:#fff;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:60px;}

  .btn{width:100%;padding:13px;border-radius:11px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:active{background:var(--navy-2);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:active{background:var(--gold-dark);color:#fff;}
  .btn-outline{background:none;border:2px solid var(--line);color:var(--text);}
  .btn:disabled{opacity:0.5;}

  .gps-box{border:1px dashed var(--line);border-radius:12px;padding:14px;margin-top:14px;text-align:center;}
  .gps-box.captured{border-style:solid;border-color:var(--success);background:var(--success-bg);}
  .gps-coords{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--success);margin-top:6px;}
  .gps-addr{font-size:12px;color:var(--muted);margin-top:4px;}
  .pin{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:17px;position:relative;}
  .pin.pulse::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--success);animation:pulse 1.4s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(0.7);opacity:1;}100%{transform:scale(1.6);opacity:0;}}

  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;max-width:80%;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,0.2);border-left:3px solid var(--gold);}

  .config-wrap{padding:40px 22px;}
  .config-logo{width:56px;height:56px;border-radius:16px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:'Sora',sans-serif;font-weight:700;font-size:22px;margin:0 auto 18px;}
  .config-title{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;text-align:center;color:var(--navy);}
  .config-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}

  .pipeline-container{background:var(--surface);border-radius:var(--radius);padding:16px;border:2px solid var(--gold-light);margin-bottom:16px;}
  .pipeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .pipeline-header h3{margin:0;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--navy);}
  .refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
  .pipeline-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
  .stat-card.success{background:var(--success-bg);}
  .stat-value{font-size:18px;font-weight:700;font-family:'Sora',sans-serif;color:var(--navy);}
  .stat-card.success .stat-value{color:var(--success);}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600;}
  .pipeline-stages{margin-top:4px;}
  .stage-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);}
  .stage-item:last-child{border-bottom:none;}
  .stage-name{font-size:12px;font-weight:500;min-width:110px;color:var(--text);display:flex;align-items:center;}
  .stage-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
  .stage-fill{height:100%;border-radius:3px;}
  .stage-count{font-size:11px;color:var(--muted);min-width:56px;text-align:right;font-weight:500;}
  .stage-color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}
  .amount-input{font-family:'IBM Plex Mono',monospace;}
  .section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin:4px 0 8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const storage = {
  get(key){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  },
  set(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
  }
};

const PIPELINE_STAGES = [
  'Lead In','Qualified Lead','Meeting Scheduled','First Meeting',
  'Proposal Sent','Under Review','Negotiation','Decision Pending',
  'Client Onboarded','Lost'
];

const STAGE_COLORS = {
  'Lead In':'#6B7280','Qualified Lead':'#2563A8','Meeting Scheduled':'#7C3AED',
  'First Meeting':'#DB2777','Proposal Sent':'#C9A84C','Under Review':'#EA580C',
  'Negotiation':'#DC2626','Decision Pending':'#7C3AED','Client Onboarded':'#1F9D63','Lost':'#6B7280'
};

const SPANCO_STAGES = ['Suspect','Prospect','Approach','Negotiation','Close','Order'];
const SPANCO_COLORS = {
  'Suspect':'#6B7280','Prospect':'#2563A8','Approach':'#7C3AED',
  'Negotiation':'#EA580C','Close':'#1F9D63','Order':'#C9A84C'
};

const STORAGE_KEY = 'vachana_tracker_config';
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_fsOFhF-Rb19yH086hc-BWYTVsKwTTXLC50WrLTzDSE1Judgk5bVqbHkj4QMzNj1j/exec';

let state = {
  scriptUrl: null,
  configuring: true,
  tab: 'search',
  query: '',
  searchResults: [],
  searching: false,
  meetings: [],
  meetingsLoading: false,
  bookingClient: null,
  updatingMeeting: null,
  gps: null,
  gpsCapturing: false,
  toast: null,
  repName: '',
  pipelineStats: null,
  pipelineLoading: false,
  spancoStats: null,
  spancoLoading: false
};

function loadConfig(){
  const cfg = storage.get(STORAGE_KEY);
  state.scriptUrl = (cfg && cfg.scriptUrl) ? cfg.scriptUrl : DEFAULT_SCRIPT_URL;
  const rep = storage.get('rep_name');
  if(rep) state.repName = rep;
  state.configuring = !state.scriptUrl;
  render();
  if(state.scriptUrl){
    testConnection();
    fetchMeetings();
    fetchPipelineStats();
    fetchSpancoStats();
  }
}

async function testConnection(){
  try{
    const data = await apiGet('test', {});
    if(data.success) showToast('Connected to sheet');
    else showToast(data.error || 'Connected but sheet reported an error');
  }catch(e){
    showToast('Could not connect. Check the URL and deployment access.');
  }
}

function saveScriptUrl(url){
  storage.set(STORAGE_KEY, {scriptUrl: url});
  state.scriptUrl = url;
  state.configuring = false;
  render();
  testConnection();
  fetchMeetings();
  fetchPipelineStats();
  fetchSpancoStats();
}

function saveRepName(name){
  state.repName = name;
  storage.set('rep_name', name);
}

function showToast(msg, ms){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast=null; render(); }, ms||2200);
}

async function apiGet(action, params){
  const url = new URL(state.scriptUrl);
  url.searchParams.set('action', action);
  Object.keys(params||{}).forEach(k=>url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(payload){
  const res = await fetch(state.scriptUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

let searchDebounce;
function onSearchInput(val){
  state.query = val;
  clearTimeout(searchDebounce);
  if(!val.trim()){ state.searchResults=[]; render(); return; }
  searchDebounce = setTimeout(async ()=>{
    state.searching = true; render();
    try{
      const data = await apiGet('search', {q: val});
      state.searchResults = data.results || [];
    }catch(e){
      showToast('Could not reach the sheet. Check settings.');
    }
    state.searching = false;
    render();
  }, 380);
}

async function fetchMeetings(){
  state.meetingsLoading = true; render();
  try{
    const data = await apiGet('list', {});
    state.meetings = data.meetings || [];
  }catch(e){
    showToast('Could not load meetings.');
  }
  state.meetingsLoading = false;
  render();
}

async function fetchPipelineStats(){
  state.pipelineLoading = true; render();
  try{
    const data = await apiGet('pipeline', {});
    state.pipelineStats = data;
  }catch(e){
    console.error('Pipeline stats error', e);
  }
  state.pipelineLoading = false;
  render();
}

async function fetchSpancoStats(){
  state.spancoLoading = true; render();
  try{
    const data = await apiGet('spanco', {});
    state.spancoStats = data;
  }catch(e){
    console.error('SPANCO stats error', e);
  }
  state.spancoLoading = false;
  render();
}

function openBooking(client){
  state.bookingClient = client;
  render();
}

async function submitBooking(form){
  const payload = {
    action:'book',
    clientCode: state.bookingClient.clientCode || '',
    leadName: state.bookingClient.name,
    mobile: state.bookingClient.mobile,
    email: state.bookingClient.email || '',
    leadSource: state.bookingClient.leadSource || '',
    investmentAmount: form.amount || '',
    meetingDate: form.date,
    meetingTime: form.time,
    purpose: form.purpose,
    pipelineStage: 'Meeting Scheduled',
    notes: form.notes,
    updatedBy: state.repName || ''
  };
  showToast('Booking meeting...', 60000);
  try{
    const res = await apiPost(payload);
    if(res.success){
      state.bookingClient = null;
      state.query=''; state.searchResults=[];
      showToast('Meeting booked');
      fetchMeetings();
      fetchPipelineStats();
      state.tab='meetings';
    }else{
      showToast(res.error || 'Could not book meeting');
    }
  }catch(e){
    showToast('Network error while booking');
  }
  render();
}

function openUpdate(meeting){
  state.updatingMeeting = meeting;
  state.gps = null;
  render();
}

function captureLocation(){
  if(!navigator.geolocation){
    showToast('Location not supported on this device');
    return;
  }
  state.gpsCapturing = true; render();
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    state.gps = {lat, lng, address: 'Looking up address...'};
    state.gpsCapturing = false;
    render();
    try{
      const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
      const j = await r.json();
      const addr = [j.locality, j.city, j.principalSubdivision].filter(Boolean).join(', ');
      state.gps.address = addr || 'Address unavailable';
    }catch(e){
      state.gps.address = 'Address lookup failed';
    }
    render();
  }, (err)=>{
    state.gpsCapturing = false;
    showToast('Could not get location: ' + err.message);
    render();
  }, {enableHighAccuracy:true, timeout:12000});
}

async function submitUpdate(form){
  const payload = {
    action:'update',
    meetingId: state.updatingMeeting.meetingID,
    status: form.status,
    notes: form.notes,
    investmentAmount: form.amount,
    address: state.gps ? state.gps.address : '',
    latitude: state.gps ? state.gps.lat : '',
    longitude: state.gps ? state.gps.lng : '',
    updatedBy: state.repName || ''
  };
  showToast('Saving update...', 60000);
  try{
    const res = await apiPost(payload);
    if(res.success){
      showToast('Meeting updated');
      return true;
    }else{
      showToast(res.error || 'Could not update meeting');
      return false;
    }
  }catch(e){
    showToast('Network error while updating');
    return false;
  }
}

async function updatePipelineStage(meetingId, newStage){
  try{
    const res = await apiPost({ action:'updateStage', meetingId: meetingId, pipelineStage: newStage, updatedBy: state.repName || '' });
    if(!res.success) showToast(res.error || 'Could not update stage');
  }catch(e){
    showToast('Network error while updating stage');
  }
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function statusClass(s){
  s = (s||'scheduled').toLowerCase();
  if(s.indexOf('complet')!==-1) return 'completed';
  if(s.indexOf('resched')!==-1) return 'rescheduled';
  if(s.indexOf('cancel')!==-1) return 'cancelled';
  if(s==='lost') return 'lost';
  return 'scheduled';
}

const LOGO_URL = 'https://vachanainvestments.com/wp-content/uploads/2023/09/Logo_PNG-300x238.png';

function renderConfig(){
  return `
  <div class="topbar"><div class="topbar-row"><div class="brand">
    <img src="${LOGO_URL}" alt="Vachana" class="brand-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="brand-mark" style="display:none;">V</div>
    <div class="brand-text"><div class="brand-name">Vachana Tracker</div><div class="brand-sub">Investments Pvt Ltd</div></div></div></div></div>
  <div class="config-wrap">
    <img src="${LOGO_URL}" alt="Vachana Investments" class="login-logo" onerror="this.style.display='none';document.getElementById('cfgFallbackLogo').style.display='flex';">
    <div class="config-logo" id="cfgFallbackLogo" style="display:none;">V</div>
    <div class="config-title">Connect your sheet</div>
    <div class="config-sub">Paste the Apps Script web app URL from your Google Sheet. One-time setup per device.</div>
    <label>Web app URL</label>
    <input type="text" id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(state.scriptUrl||'')}">
    <label>Your name (for update history)</label>
    <input type="text" id="cfgName" placeholder="e.g. Rahul Sharma" value="${esc(state.repName)}">
    <button class="btn btn-gold" onclick="handleSaveConfig()">Save and continue</button>
  </div>`;
}

window.handleSaveConfig = function(){
  const url = document.getElementById('cfgUrl').value.trim();
  const name = document.getElementById('cfgName').value.trim();
  if(!url){ showToast('Paste the web app URL first'); return; }
  saveRepName(name);
  saveScriptUrl(url);
};

function renderTopbar(title){
  return `
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <img src="${LOGO_URL}" alt="Vachana" class="brand-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="brand-mark" style="display:none;">V</div>
        <div class="brand-text"><div class="brand-name">${title}</div><div class="brand-sub">Vachana Investments</div></div>
      </div>
      <button class="icon-btn" onclick="handleOpenSettings()" aria-label="Settings">&#9881;</button>
    </div>
  </div>`;
}

window.handleOpenSettings = function(){
  state.configuring = true;
  render();
};

function renderSearchTab(){
  let resultsHtml = '';
  if(state.searching){
    resultsHtml = `<div class="empty">Searching...</div>`;
  } else if(state.query.trim() && state.searchResults.length===0){
    resultsHtml = `<div class="empty">No leads match "${esc(state.query)}"</div>`;
  } else if(state.searchResults.length){
    resultsHtml = state.searchResults.map((c,i)=>{
      const tag = c.clientCode || c.leadSource || '';
      return `
      <div class="card" onclick="handleOpenBooking(${i})">
        <div class="client-row">
          <div>
            <div class="client-name">${esc(c.name)}</div>
            <div class="client-sub">${esc(c.mobile)}${c.email? ' &middot; '+esc(c.email):''}</div>
          </div>
          ${tag? `<div class="badge scheduled">${esc(tag)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    resultsHtml = `<div class="empty">Search by name, mobile number, or email to book a meeting.</div>`;
  }
  return renderTopbar('Search &amp; book') + `
  <div class="content">
    <div class="search-box"><span>&#128269;</span><input type="text" placeholder="Search leads..." value="${esc(state.query)}" oninput="onSearchInput(this.value)"></div>
    ${resultsHtml}
  </div>`;
}

function renderSpancoDashboard(){
  const stats = state.spancoStats;
  if(!stats || state.spancoLoading){
    return `<div class="pipeline-container"><div class="empty">Loading lead stages...</div></div>`;
  }
  if(stats.error){
    return `<div class="pipeline-container"><div class="empty">${esc(stats.error)}</div></div>`;
  }
  if(stats.columnFound === false){
    return `<div class="pipeline-container"><div class="empty">Couldn't find a SPANCO/Lead Stage column on your sheet. Check the column name.</div></div>`;
  }
  const total = stats.total || 0;
  const stagesHtml = SPANCO_STAGES.map(stage=>{
    const count = (stats.stats && stats.stats[stage]) || 0;
    const pct = (stats.conversionRates && stats.conversionRates[stage]) || '0%';
    const barWidth = total > 0 ? Math.round((count/total)*100) : 0;
    const color = SPANCO_COLORS[stage] || '#6B7280';
    return `
      <div class="stage-item">
        <div class="stage-name"><span class="stage-color-dot" style="background:${color}"></span>${stage}</div>
        <div class="stage-bar"><div class="stage-fill" style="width:${barWidth}%;background:${color}"></div></div>
        <div class="stage-count">${count} (${pct})</div>
      </div>`;
  }).join('');
  return `
  <div class="pipeline-container">
    <div class="pipeline-header"><h3>Lead pipeline (SPANCO)</h3><button class="refresh-btn" onclick="fetchSpancoStats()" aria-label="Refresh">&#8635;</button></div>
    <div class="pipeline-stats-grid" style="grid-template-columns:1fr 1fr;">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total leads</div></div>
      <div class="stat-card"><div class="stat-value">${stats.unspecified||0}</div><div class="stat-label">Stage not set</div></div>
    </div>
    <div class="pipeline-stages">${stagesHtml}</div>
  </div>`;
}

function renderPipelineDashboard(){
  const stats = state.pipelineStats;
  if(!stats || state.pipelineLoading){
    return `<div class="pipeline-container"><div class="empty">Loading pipeline...</div></div>`;
  }
  const total = stats.total || 0;
  const winRate = stats.winRate || '0%';
  const totalAmount = Number(stats.totalInvestmentAmount || 0);
  const stagesHtml = PIPELINE_STAGES.map(stage=>{
    const count = (stats.stats && stats.stats[stage]) || 0;
    const pct = (stats.conversionRates && stats.conversionRates[stage]) || '0%';
    const barWidth = total > 0 ? Math.round((count/total)*100) : 0;
    const color = STAGE_COLORS[stage] || '#6B7280';
    return `
      <div class="stage-item">
        <div class="stage-name"><span class="stage-color-dot" style="background:${color}"></span>${stage}</div>
        <div class="stage-bar"><div class="stage-fill" style="width:${barWidth}%;background:${color}"></div></div>
        <div class="stage-count">${count} (${pct})</div>
      </div>`;
  }).join('');
  return `
  <div class="pipeline-container">
    <div class="pipeline-header"><h3>Pipeline overview</h3><button class="refresh-btn" onclick="fetchPipelineStats()" aria-label="Refresh">&#8635;</button></div>
    <div class="pipeline-stats-grid">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total leads</div></div>
      <div class="stat-card success"><div class="stat-value">${winRate}</div><div class="stat-label">Win rate</div></div>
      <div class="stat-card"><div class="stat-value">&#8377;${totalAmount.toLocaleString('en-IN')}</div><div class="stat-label">Pipeline value</div></div>
    </div>
    <div class="pipeline-stages">${stagesHtml}</div>
  </div>`;
}

function renderMeetingsTab(){
  let body;
  if(state.meetingsLoading){
    body = `<div class="empty">Loading meetings...</div>`;
  } else if(!state.meetings.length){
    body = `<div class="empty">No meetings yet. Book one from Search.</div>`;
  } else {
    body = state.meetings.map((m,i)=>{
      const stage = m.pipelineStage || 'Lead In';
      const color = STAGE_COLORS[stage] || '#6B7280';
      const status = m.status || 'Scheduled';
      const hasLocation = m.latitude && m.longitude;
      const mapLink = hasLocation ? `https://www.google.com/maps?q=${m.latitude},${m.longitude}` : null;
      const notesPreview = m.notes ? (String(m.notes).length > 60 ? esc(m.notes).slice(0,60)+'...' : esc(m.notes)) : '';
      return `
      <div class="card" onclick="handleOpenUpdate(${i})">
        <div class="meeting-row">
          <div class="meeting-main">
            <div class="meeting-name">${esc(m.leadName)}</div>
            <div class="meeting-meta">
              <span>${esc(m.meetingDate)} ${esc(m.meetingTime)}</span>
              ${m.investmentAmount? ` &middot; <span>&#8377;${esc(m.investmentAmount)}</span>` : ''}
              <span class="stage-badge" style="background:${color}22;color:${color}">${esc(stage)}</span>
            </div>
            ${m.address? `<div class="meeting-location">&#128205; ${esc(m.address)}${mapLink? ` &middot; <a href="${mapLink}" target="_blank" onclick="event.stopPropagation()">View on map</a>`:''}</div>` : ''}
            ${notesPreview? `<div class="meeting-notes-preview">${notesPreview}</div>` : ''}
          </div>
          <span class="badge ${statusClass(status)}">${esc(status)}</span>
        </div>
      </div>`;
    }).join('');
  }
  return renderTopbar('Pipeline') + `
  <div class="content">
    <div class="section-label">Lead stage (pre-meeting)</div>
    ${renderSpancoDashboard()}
    <div class="section-label">Deal conversion (post-meeting)</div>
    ${renderPipelineDashboard()}
    <div class="section-label">Recent meetings</div>
    ${body}
  </div>`;
}

function renderBottomNav(){
  return `
  <div class="bottomnav">
    <button class="navbtn ${state.tab==='search'?'active':''}" onclick="handleTab('search')"><span class="dot">&#128269;</span>Search &amp; book</button>
    <button class="navbtn ${state.tab==='meetings'?'active':''}" onclick="handleTab('meetings')"><span class="dot">&#128202;</span>Pipeline</button>
  </div>`;
}

window.handleTab = function(t){
  state.tab = t;
  if(t==='meetings'){ fetchMeetings(); fetchPipelineStats(); fetchSpancoStats(); }
  render();
};

window.handleOpenBooking = function(i){ openBooking(state.searchResults[i]); };
window.handleOpenUpdate = function(i){ openUpdate(state.meetings[i]); };

function renderBookingSheet(){
  if(!state.bookingClient) return '';
  const c = state.bookingClient;
  const today = new Date().toISOString().slice(0,10);
  return `
  <div class="sheet-overlay" onclick="handleCloseSheetBg(event,'booking')">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Book meeting</div>
      <div class="sheet-sub">${esc(c.name)} &middot; ${esc(c.mobile)}</div>
      <label>Date</label><input type="date" id="bkDate" min="${today}" value="${today}">
      <label>Time</label><input type="time" id="bkTime" value="10:00">
      <label>Investment amount (&#8377;)</label><input type="number" id="bkAmount" class="amount-input" placeholder="e.g. 500000">
      <label>Purpose</label>
      <select id="bkPurpose">
        <option>Initial investment discussion</option>
        <option>Portfolio review</option>
        <option>Investment proposal presentation</option>
        <option>Document collection</option>
        <option>KYC verification</option>
        <option>Follow-up meeting</option>
        <option>Other</option>
      </select>
      <label>Comment (optional)</label><textarea id="bkNotes" placeholder="Anything the team should know"></textarea>
      <button class="btn btn-gold" onclick="handleSubmitBooking()">Confirm booking</button>
      <button class="btn btn-outline" onclick="handleCloseSheet('booking')">Cancel</button>
    </div>
  </div>`;
}

window.handleSubmitBooking = function(){
  const form = {
    date: document.getElementById('bkDate').value,
    time: document.getElementById('bkTime').value,
    amount: document.getElementById('bkAmount').value,
    purpose: document.getElementById('bkPurpose').value,
    notes: document.getElementById('bkNotes').value
  };
  if(!form.date || !form.time){ showToast('Pick a date and time'); return; }
  submitBooking(form);
};

window.handleCloseSheet = function(which){
  if(which==='booking') state.bookingClient = null;
  if(which==='update'){ state.updatingMeeting = null; state.gps = null; }
  render();
};
window.handleCloseSheetBg = function(e, which){
  if(e.target.classList.contains('sheet-overlay')) handleCloseSheet(which);
};

function renderUpdateSheet(){
  if(!state.updatingMeeting) return '';
  const m = state.updatingMeeting;
  const statuses = ['Scheduled','Completed','Rescheduled','Cancelled'];
  const currentStage = m.pipelineStage || 'Meeting Scheduled';
  const stageOptions = PIPELINE_STAGES.map(s=>`<option ${s===currentStage?'selected':''}>${s}</option>`).join('');
  let gpsHtml;
  if(state.gpsCapturing){
    gpsHtml = `<div class="gps-box"><div class="pin pulse">&#128205;</div><div>Getting your location...</div></div>`;
  } else if(state.gps){
    gpsHtml = `
      <div class="gps-box captured">
        <div class="pin">&#128205;</div>
        <div>Location captured</div>
        <div class="gps-coords">${state.gps.lat.toFixed(5)}, ${state.gps.lng.toFixed(5)}</div>
        <div class="gps-addr">${esc(state.gps.address)}</div>
      </div>`;
  } else {
    gpsHtml = `
      <div class="gps-box">
        <div class="pin">&#128205;</div>
        <div style="margin-bottom:8px;">No location captured yet</div>
        <button class="btn btn-outline" style="margin-top:0;" onclick="captureLocation()">Capture my location</button>
      </div>`;
  }
  return `
  <div class="sheet-overlay" onclick="handleCloseSheetBg(event,'update')">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Update meeting</div>
      <div class="sheet-sub">${esc(m.leadName)} &middot; ${esc(m.meetingDate)} ${esc(m.meetingTime)}</div>
      <label>Pipeline stage</label>
      <select id="upStage">${stageOptions}</select>
      <label>Status</label>
      <select id="upStatus">${statuses.map(s=>`<option ${((m.status||'Scheduled')===s)?'selected':''}>${s}</option>`).join('')}</select>
      <label>Investment amount (&#8377;)</label>
      <input type="number" id="upAmount" class="amount-input" value="${esc(m.investmentAmount||'')}">
      <label>Comment</label>
      <textarea id="upNotes" placeholder="Meeting outcome, next steps...">${esc(m.notes||'')}</textarea>
      ${gpsHtml}
      <button class="btn btn-primary" onclick="handleSubmitUpdate()">Save update</button>
      <button class="btn btn-outline" onclick="handleCloseSheet('update')">Cancel</button>
    </div>
  </div>`;
}

window.handleSubmitUpdate = async function(){
  const newStage = document.getElementById('upStage').value;
  const form = {
    status: document.getElementById('upStatus').value,
    amount: document.getElementById('upAmount').value,
    notes: document.getElementById('upNotes').value
  };
  const meetingId = state.updatingMeeting.meetingID;
  const prevStage = state.updatingMeeting.pipelineStage || 'Meeting Scheduled';
  showToast('Saving update...', 60000);
  const ok = await submitUpdate(form);
  if(ok && newStage !== prevStage){
    await updatePipelineStage(meetingId, newStage);
  }
  if(ok){
    state.updatingMeeting = null;
    state.gps = null;
    fetchMeetings();
    fetchPipelineStats();
  }
  render();
};

function renderToast(){
  if(!state.toast) return '';
  return `<div class="toast">${esc(state.toast)}</div>`;
}

function render(){
  const app = document.getElementById('app');
  if(state.configuring){ app.innerHTML = renderConfig(); return; }
  const body = state.tab==='search' ? renderSearchTab() : renderMeetingsTab();
  app.innerHTML = body + renderBottomNav() + renderBookingSheet() + renderUpdateSheet() + renderToast();
}

loadConfig();
</script>
</body>
</html>
